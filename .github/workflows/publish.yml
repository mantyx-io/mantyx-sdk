# Publishes @mantyx/sdk to npm, mantyx-sdk to PyPI, and pushes git tags for
# the Go module (monorepo path ./go).
#
# Prerequisites (once per repo):
#   - GitHub Actions secret NPM_TOKEN: npm automation token with publish scope
#     for @mantyx/sdk
#   - PyPI Trusted Publisher configured for the `mantyx-sdk` project pointing
#     at this repo + workflow file (see python/CONTRIBUTING.md). No secret
#     needed; OIDC is used via id-token: write.
#
# Maintainer flow:
#   1. Bump repo root VERSION, run `node scripts/sync-version.mjs`,
#      commit and push to main (CHANGELOGs may still show [Unreleased] until
#      tags exist — this workflow regenerates and pushes them after tagging).
#   2. Run this workflow from the Actions tab (optionally enable dry_run
#      first to verify everything builds).
#
# Go consumers resolve versions via tags prefixed with the module directory:
# go/v0.1.0
# npm uses package.json version (must match VERSION).
# PyPI uses pyproject.toml dynamic version (must match VERSION).

name: Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + publish dry-run only; do not push tags or upload to npm/PyPI"
        type: boolean
        default: false

concurrency:
  group: publish-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish npm + PyPI + tag Go module
    runs-on: ubuntu-latest
    # Manual releases should run from the branch that contains the version bump.
    if: github.ref_name == 'main' || github.ref_name == 'master'
    environment:
      name: pypi
      url: https://pypi.org/p/mantyx-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Require NPM_TOKEN (non–dry-run)
        if: ${{ !inputs.dry_run }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::Secret NPM_TOKEN is not set. Add an npm automation token in repo Settings → Secrets."
            exit 1
          fi

      - name: Read VERSION
        id: version
        run: |
          set -euo pipefail
          V="$(tr -d '[:space:]' < VERSION)"
          echo "value=${V}" >> "${GITHUB_OUTPUT}"
          echo "Publishing version: ${V}"

      - name: Verify version sync
        run: node scripts/sync-version.mjs --check

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2.10.1

      - name: Verify CHANGELOGs are in sync
        run: node scripts/changelog.mjs --check

      - name: Verify agent-runs protocol mirrors
        run: node scripts/sync-agent-runs-doc.mjs --check

      - name: Build release notes
        env:
          V: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          mkdir -p .release
          node scripts/changelog.mjs --release-body --version="${V}" > .release/notes.md
          node scripts/changelog.mjs --release-body --version="${V}" --package=ts > .release/notes-ts.md
          node scripts/changelog.mjs --release-body --version="${V}" --package=go > .release/notes-go.md
          node scripts/changelog.mjs --release-body --version="${V}" --package=py > .release/notes-py.md
          echo "::group::Unified release notes"
          cat .release/notes.md
          echo "::endgroup::"

      - name: Tags must not exist yet
        if: ${{ !inputs.dry_run }}
        env:
          V: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          git fetch origin --tags --quiet || true
          for ref in "v${V}" "go/v${V}" "python/v${V}"; do
            if git rev-parse "refs/tags/${ref}" >/dev/null 2>&1; then
              echo "::error::Git tag ${ref} already exists. Bump VERSION or delete the tag."
              exit 1
            fi
          done

      # ----- Go ---------------------------------------------------------
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go/go.sum

      - name: Go test
        working-directory: go
        run: go test ./... -race -count=1

      # ----- TypeScript / npm ------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ts/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: npm ci + verify
        working-directory: ts
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build

      - name: npm publish (dry run)
        if: ${{ inputs.dry_run }}
        working-directory: ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --dry-run --access public

      - name: npm publish
        if: ${{ !inputs.dry_run }}
        working-directory: ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      # ----- Python / PyPI ---------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python distribution
        working-directory: python
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e ".[dev]"
          pytest -q
          python -m build

      - name: Publish to PyPI (dry run)
        if: ${{ inputs.dry_run }}
        working-directory: python
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist

      # ----- Tags + GitHub Releases ------------------------------------
      - name: Push release tags
        if: ${{ !inputs.dry_run }}
        env:
          V: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${V}"        -m "Release v${V} (TypeScript SDK + monorepo)"
          git tag -a "go/v${V}"     -m "Go module release v${V} (./go)"
          git tag -a "python/v${V}" -m "Python SDK release v${V} (./python)"
          git push origin "refs/tags/v${V}" "refs/tags/go/v${V}" "refs/tags/python/v${V}"

      - name: Regenerate CHANGELOGs and push to default branch
        if: ${{ !inputs.dry_run }}
        env:
          V: ${{ steps.version.outputs.value }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git fetch origin --tags --quiet || true
          node scripts/changelog.mjs --write
          if git diff --quiet HEAD -- ts/CHANGELOG.md go/CHANGELOG.md python/CHANGELOG.md; then
            echo "No CHANGELOG edits after tagging — skipping commit."
            exit 0
          fi
          git add ts/CHANGELOG.md go/CHANGELOG.md python/CHANGELOG.md
          git commit -m "chore(repo): sync CHANGELOGs after v${V} release"

          # Earlier publish steps (npm build / publish, pip install -e ., python -m
          # build, pytest) can leave tracked files dirty (regenerated bytecode,
          # build metadata, etc). git pull --rebase refuses to run with a dirty
          # tree, so stash anything that isn't part of this commit out of the way.
          # The runner is ephemeral, so we don't bother restoring the stash.
          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "::group::Stashing residual changes before rebase"
            git status --short
            echo "::endgroup::"
            git stash push --include-untracked --quiet --message "publish-residual" || true
          fi
          git pull --rebase origin "${BRANCH}"
          git push origin "HEAD:${BRANCH}"

      - name: Create GitHub Releases
        if: ${{ !inputs.dry_run }}
        env:
          V: ${{ steps.version.outputs.value }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "v${V}"        --title "v${V}"            --notes-file .release/notes-ts.md
          gh release create "go/v${V}"     --title "go/v${V}"         --notes-file .release/notes-go.md
          gh release create "python/v${V}" --title "python/v${V}"     --notes-file .release/notes-py.md
