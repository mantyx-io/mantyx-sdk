# Build the Astro Starlight site under ./site and deploy it to GitHub Pages.
#
# One-time setup:
#   - Repo → Settings → Pages → Source: GitHub Actions
#
# Triggers on:
#   - push to main when site/, docs/, or any SDK README changes
#   - manual workflow_dispatch

name: Docs

on:
  push:
    branches: [main, master]
    paths:
      - "site/**"
      - "docs/**"
      - "ts/README.md"
      - "go/README.md"
      - "python/README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: docs-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        env:
          # Default to a project page at https://<owner>.github.io/<repo>/.
          # Override SITE_BASE / SITE_URL via repo Variables (Settings → Variables)
          # for a custom domain.
          SITE_BASE: ${{ vars.SITE_BASE || format('/{0}/', github.event.repository.name) }}
          SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io', github.repository_owner) }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
